name: serialkompat
description: >-
  Backward/forward JSON wire-compatibility gate for kotlinx-serialization
  @Serializable models. Runs serialkompatCheck and posts a sticky PR comment.
author: chrisjenx
branding:
  icon: shield
  color: purple

inputs:
  ref:
    description: >-
      Baseline git ref to check against. Overrides the configured baselineRef
      (passed as -Pserialkompat.ref). Defaults to the plugin's baselineRef.
    required: false
    default: ""
  task:
    description: Gradle task to run.
    required: false
    default: serialkompatCheckAgainst
  report-path:
    description: Path to the JSON report the sticky comment is built from.
    required: false
    default: build/serialkompat/report.json
  gradle-args:
    description: Extra arguments passed to Gradle.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run serialkompat
      id: check
      shell: bash
      run: |
        set +e
        REF_ARG=""
        if [ -n "${{ inputs.ref }}" ]; then REF_ARG="-Pserialkompat.ref=${{ inputs.ref }}"; fi
        ./gradlew ${{ inputs.task }} $REF_ARG ${{ inputs.gradle-args }} --console=plain
        echo "exit_code=$?" >> "$GITHUB_OUTPUT"

    - name: Post sticky PR comment
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const marker = '<!-- serialkompat -->';
          const path = '${{ inputs.report-path }}';
          let body;
          if (fs.existsSync(path)) {
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const s = report.summary || {};
            const icon = s.failed ? '❌' : (s.warning > 0 ? '⚠️' : '✅');
            const lines = (report.findings || [])
              .filter(f => !f.acknowledged)
              .map(f => `- **${f.severity}** \`${f.rule}\` — ${f.contract} (${f.direction})\n  ${f.message}`)
              .join('\n');
            body = `${marker}\n### ${icon} serialkompat\n\n`
              + `**${s.breaking ?? 0} breaking**, ${s.warning ?? 0} warning, ${s.acknowledged ?? 0} acknowledged.\n\n`
              + (lines || '_No incompatible changes._');
          } else {
            body = `${marker}\n### serialkompat\n\n_No report was produced (nothing configured to check)._`;
          }
          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
          const existing = comments.find(c => c.body && c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
          }

    - name: Fail on incompatible changes
      if: steps.check.outputs.exit_code != '0'
      shell: bash
      run: |
        echo "serialkompat reported incompatible wire changes."
        exit 1
