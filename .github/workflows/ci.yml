name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [17, 21]
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test, format & API check
        run: ./gradlew build koverXmlReport -x :serialkompat-annotations:build --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: reports-jdk${{ matrix.java }}
          path: '**/build/reports/'
          if-no-files-found: ignore
          retention-days: 7

  build-annotations-macos:
    name: serialkompat-annotations (macOS, Apple targets)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build & apiCheck (all targets incl. Apple — the only host that builds all of them)
        run: ./gradlew :serialkompat-annotations:build --stacktrace
