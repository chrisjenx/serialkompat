name: Docs

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "requirements-docs.txt"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  # Don't cancel an in-flight main deploy; superseded PR builds are safe to cancel.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # PRs: strict build is the gate. Pushes to main: also produces the deploy artifact.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          # Non-default requirements filename; without this, setup-python's pip
          # cache errors with "No file matched to **/requirements.txt".
          cache-dependency-path: requirements-docs.txt
      - run: pip install -r requirements-docs.txt
      - name: Generate API docs
        run: ./gradlew dokkaGenerate --stacktrace
      - name: Build site (strict)
        run: mkdocs build --strict
      - name: Nest API docs under /api
        run: mkdir -p site/api && cp -R build/dokka/html/. site/api/
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  publish:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      # enablement:true lets the workflow turn on GitHub Pages (Actions source) itself.
      - uses: actions/configure-pages@v6
        with:
          enablement: true
      - id: deploy
        uses: actions/deploy-pages@v5
