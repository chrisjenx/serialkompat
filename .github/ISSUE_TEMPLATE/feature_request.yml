name: Feature request
description: Suggest a capability, rule, or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What compatibility scenario or workflow gap are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: design
    attributes:
      label: Design alignment
      options:
        - label: I've checked this against the design doc (docs/superpowers/specs) and roadmap
