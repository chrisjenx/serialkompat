name: Bug report
description: Report incorrect behaviour (e.g. a change misclassified as safe/breaking)
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report! Please include enough detail to reproduce.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did serialkompat do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The `@Serializable` model(s) (before/after), the `Json { }` config, and the command run.
      render: kotlin
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Actual output / findings
      render: shell
  - type: input
    id: version
    attributes:
      label: serialkompat version
    validations:
      required: true
  - type: input
    id: kotlin-version
    attributes:
      label: Kotlin / kotlinx-serialization versions
    validations:
      required: true
